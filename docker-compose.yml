services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mipolla
      POSTGRES_USER: mipolla
      POSTGRES_PASSWORD: mipolla123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8003:8000"
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.local
      SECRET_KEY: dev-secret-key-not-for-production
      DB_NAME: mipolla
      DB_USER: mipolla
      DB_PASSWORD: mipolla123
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db

volumes:
  postgres_data:
