{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ torneo.nombre }} — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/polla.css' %}">
</head>
<body class="login-wrap">

<div class="login-box">
  <!-- Logo -->
  <div class="text-center mb-4">
    {% if torneo.logo %}
    <img src="{{ torneo.logo.url }}" alt="{{ torneo.nombre }}" style="max-height:70px;max-width:240px;object-fit:contain;">
    {% else %}
    <div class="login-logo mb-1">⚽</div>
    {% endif %}
    <h1 class="fw-9 mt-2 mb-0" style="font-size:1.5rem;">{{ torneo.nombre }}</h1>
    <p class="text-gray mb-0" style="font-size:.82rem;">{{ torneo.temporada }}</p>
    <div style="height:3px;background:#2563eb;border-radius:999px;width:40px;margin:.75rem auto 0;"></div>
  </div>

  <!-- Error -->
  {% if form.errors %}
  <div class="alert alert-danger py-2 mb-3">
    <i class="bi bi-exclamation-circle me-1"></i>Usuario o contraseña incorrectos.
  </div>
  {% endif %}

  <!-- Form -->
  <form method="post" autocomplete="on">
    {% csrf_token %}
    <div class="field">
      <label>Usuario</label>
      <div style="position:relative;">
        <i class="bi bi-person" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#9ca3af;"></i>
        <input type="text" name="username" placeholder="Tu número o usuario"
               autocomplete="username" autofocus required
               style="padding-left:2.2rem;width:100%;padding-top:.5rem;padding-bottom:.5rem;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;color:#111827;font-size:.875rem;">
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div style="position:relative;">
        <i class="bi bi-lock" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#9ca3af;"></i>
        <input type="password" name="password" placeholder="••••••"
               autocomplete="current-password" required
               style="padding-left:2.2rem;width:100%;padding-top:.5rem;padding-bottom:.5rem;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;color:#111827;font-size:.875rem;">
      </div>
    </div>
    <button type="submit" class="btn-polla btn-blue btn-full btn-lg-p mt-2">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>
  </form>

  <p class="text-center mt-3 mb-0" style="font-size:.72rem;color:#9ca3af;">
    <i class="bi bi-lock-fill me-1"></i>Solo participantes invitados
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
