{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ torneo.nombre }} — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/polla.css' %}?v=dark3">
</head>
<body class="login-bg">

<div class="login-box">

  <!-- Logo -->
  <div class="text-center mb-4">
    {% if torneo.logo %}
    <span style="background:#fff;border-radius:10px;padding:4px 10px;display:inline-block;">
      <img src="{{ torneo.logo.url }}" alt="{{ torneo.nombre }}" style="max-height:50px;max-width:200px;object-fit:contain;">
    </span>
    {% else %}
    <span style="background:#fff;border-radius:10px;padding:4px 10px;display:inline-block;">
      <img src="{% static 'img/logo_mundial2026.png' %}" alt="Mundial 2026" style="max-height:50px;max-width:220px;object-fit:contain;">
    </span>
    {% endif %}
  </div>

  <!-- Error -->
  {% if form_error %}
  <div style="background:var(--red-d);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:.55rem .85rem;margin-bottom:1rem;font-size:.83rem;color:var(--red);">
    <i class="bi bi-exclamation-circle me-1"></i>Número o contraseña incorrectos.
  </div>
  {% endif %}

  <form method="post" autocomplete="on">
    {% csrf_token %}

    <!-- Phone with country code selector -->
    <div class="form-field">
      <label style="color:rgba(255,255,255,.7);">Número de WhatsApp</label>
      <div style="display:flex;gap:0;border:2px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);transition:border-color .15s;" id="user-wrap"
           onfocusin="this.style.borderColor='var(--primary)'" onfocusout="this.style.borderColor='var(--border)'">
        <select name="codigo_pais" autocomplete="tel-country-code"
                style="background:rgba(255,255,255,.08);border:none;border-right:1px solid var(--border);outline:none;padding:.55rem .5rem;font-size:.85rem;font-weight:800;color:#fff;cursor:pointer;flex-shrink:0;">
          <option value="591" style="background:#1a1d2e;">🇧🇴 +591</option>
          <option value="353" style="background:#1a1d2e;">🇮🇪 +353</option>
          <option value="1"   style="background:#1a1d2e;">🇺🇸 +1</option>
          <option value="54"  style="background:#1a1d2e;">🇦🇷 +54</option>
          <option value="55"  style="background:#1a1d2e;">🇧🇷 +55</option>
          <option value="56"  style="background:#1a1d2e;">🇨🇱 +56</option>
          <option value="57"  style="background:#1a1d2e;">🇨🇴 +57</option>
          <option value="51"  style="background:#1a1d2e;">🇵🇪 +51</option>
          <option value="52"  style="background:#1a1d2e;">🇲🇽 +52</option>
          <option value="34"  style="background:#1a1d2e;">🇪🇸 +34</option>
        </select>
        <input type="tel" name="numero_local" id="numero_local"
               placeholder="70000000"
               autocomplete="tel-local"
               inputmode="numeric"
               autofocus required
               style="flex:1;background:transparent;border:none;outline:none;padding:.55rem .85rem;color:#fff;font-size:1.05rem;font-weight:700;letter-spacing:1px;min-width:0;">
      </div>
    </div>

    <!-- Password with eye toggle -->
    <div class="form-field">
      <label style="color:rgba(255,255,255,.7);">Contraseña</label>
      <div style="position:relative;border:2px solid var(--border);border-radius:10px;background:var(--surface);display:flex;align-items:center;transition:border-color .15s;" id="pwd-wrap">
        <input type="password" name="password" id="pwd-input"
               placeholder="••••••"
               autocomplete="current-password" required
               onfocus="document.getElementById('pwd-wrap').style.borderColor='var(--primary)'"
               onblur="document.getElementById('pwd-wrap').style.borderColor='var(--border)'"
               style="flex:1;background:transparent;border:none;outline:none;padding:.55rem .85rem;color:#fff;font-size:1rem;font-weight:700;letter-spacing:3px;min-width:0;">
        <button type="button" id="eye-btn" onclick="togglePwd()"
                style="background:none;border:none;padding:.55rem .75rem;color:var(--muted);cursor:pointer;flex-shrink:0;font-size:1.1rem;line-height:1;display:flex;align-items:center;">
          <i class="bi bi-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button type="submit"
            style="width:100%;margin-top:.5rem;padding:.65rem;border-radius:999px;border:none;cursor:pointer;font-size:1rem;font-weight:900;letter-spacing:.5px;background:var(--primary);color:#fff;box-shadow:0 4px 16px var(--prim-gl);transition:all .15s;"
            onmouseover="this.style.background='var(--prim-d)'"
            onmouseout="this.style.background='var(--primary)'">
      <i class="bi bi-box-arrow-in-right me-2"></i>ENTRAR
    </button>
  </form>

  <!-- Forgot password -->
  <div class="text-center mt-3">
    <a href="{% url 'polla:forgot_password' %}"
       style="font-size:.82rem;color:rgba(255,255,255,.5);text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;">
      <i class="bi bi-whatsapp" style="color:#25D366;"></i>Olvidé mi contraseña
    </a>
  </div>

</div>

<script>
function togglePwd() {
  const input = document.getElementById('pwd-input');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    input.style.letterSpacing = 'normal';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    input.style.letterSpacing = '3px';
    icon.className = 'bi bi-eye';
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
