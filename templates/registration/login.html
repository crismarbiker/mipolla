{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ torneo.nombre }} — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/polla.css' %}?v=dark3">
</head>
<body class="login-bg">

<div class="login-box">
  <!-- Country stripe -->
  <div class="login-stripe mb-4" style="background:linear-gradient(90deg,#BF0D3E 33.3%,#002868 33.3% 66.6%,#006847 66.6%);"></div>

  <!-- Logo / Brand -->
  <div class="text-center mb-4">
    {% if torneo.logo %}
    <img src="{{ torneo.logo.url }}" alt="{{ torneo.nombre }}" style="max-height:80px;max-width:280px;object-fit:contain;margin-bottom:.5rem;">
    {% else %}
    <img src="{% static 'img/logo_mundial2026.png' %}" alt="Mundial 2026"
         style="max-height:80px;max-width:280px;object-fit:contain;margin-bottom:.5rem;">
    {% endif %}
  </div>

  {% if form.errors %}
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:.5rem .75rem;font-size:.8rem;color:#dc2626;margin-bottom:1rem;">
    <i class="bi bi-exclamation-circle me-1"></i>Usuario o contraseña incorrectos.
  </div>
  {% endif %}

  <form method="post" autocomplete="on">
    {% csrf_token %}
    <div class="form-field">
      <label>Usuario</label>
      <div style="position:relative;">
        <i class="bi bi-person" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#9aa3ae;"></i>
        <input type="text" name="username" placeholder="Tu número o usuario"
               autocomplete="username" autofocus required
               style="padding-left:2.2rem;">
      </div>
    </div>
    <div class="form-field">
      <label>Contraseña</label>
      <div style="position:relative;">
        <i class="bi bi-lock" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:#9aa3ae;"></i>
        <input type="password" name="password" placeholder="••••••"
               autocomplete="current-password" required
               style="padding-left:2.2rem;">
      </div>
    </div>
    <button type="submit" class="btn btn-wine btn-full btn-lg mt-2">
      <i class="bi bi-box-arrow-in-right"></i> Entrar
    </button>
  </form>

  <p class="text-center mt-3 mb-0" style="font-size:.72rem;color:#9aa3ae;">
    <i class="bi bi-lock-fill me-1"></i>Solo participantes invitados · Contacta al administrador
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
