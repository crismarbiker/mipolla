services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - /opt/mipolla/staticfiles:/app/staticfiles
      - /opt/mipolla/mediafiles:/app/mediafiles
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.production
      EVOLUTION_INSTANCE: mipolla
    depends_on:
      - db
    networks:
      - default
      - elcarguero_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
  elcarguero_net:
    external: true
    name: elcarguero_default
